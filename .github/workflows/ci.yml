name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        run: |
          dotnet test tests/JobService.Tests --no-build --configuration Release

      - name: Integration tests
        run: |
          dotnet test tests/Integration.Tests --no-build --configuration Release
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/*-results.xml'
          reporter: dotnet-trx
