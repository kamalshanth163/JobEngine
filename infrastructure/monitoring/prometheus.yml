global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: /metrics

  - job_name: auth-service
    static_configs:
      - targets: ['auth-service:8080']
    metrics_path: /metrics

  - job_name: job-service
    static_configs:
      - targets: ['job-service:8081']
    metrics_path: /metrics

  - job_name: worker-service
    static_configs:
      - targets: ['worker-service:8083']
    metrics_path: /metrics

  - job_name: execution-service
    static_configs:
      - targets: ['execution-service:8084']
    metrics_path: /metrics

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: /metrics
